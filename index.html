<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💸 Scan to Pay</title>

<meta name="description" content="Scan the QR code or tap Pay Now to pay Vikas Sharma.">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="💸 Scan to Pay">
<meta property="og:description" content="Vikas Sharma • UPI ID: mstrvikasaxis@ybl">
<meta property="og:image" content="https://pay2me.github.io/qr.png">
<meta property="og:url" content="https://pay2me.github.io/">

<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0d6efd">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#eef2ff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.header{
    background:linear-gradient(135deg,#0d6efd,#5b8cff);
    color:white;
    padding:25px;
    text-align:center;
}

.header h1{
    font-size:28px;
}

.header p{
    margin-top:8px;
    opacity:.9;
}

.content{
    padding:25px;
    text-align:center;
}

.qr{
    width:260px;
    max-width:100%;
    border-radius:15px;
    border:1px solid #ddd;
}

.name{
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
}

.upi{
    color:#666;
    margin-top:8px;
    font-weight:bold;
    word-break:break-all;
}

button{
    width:100%;
    border:none;
    border-radius:12px;
    padding:15px;
    margin-top:16px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

.pay{
    background:#0d6efd;
    color:white;
}

.pay:hover{
    background:#0b5ed7;
}

.copy{
    background:#ececec;
}

.copy:hover{
    background:#ddd;
}

.apps{
    margin-top:25px;
    color:#666;
    line-height:1.8;
    font-size:15px;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:14px;
}

.toast{
    position:fixed;
    left:50%;
    bottom:30px;
    transform:translateX(-50%);
    background:#222;
    color:white;
    padding:12px 18px;
    border-radius:8px;
    opacity:0;
    transition:.3s;
}

.toast.show{
    opacity:1;
}

@media(prefers-color-scheme:dark){

body{
    background:#111;
}

.card{
    background:#1d1d1d;
    color:white;
}

.upi,
.apps,
.footer{
    color:#bbb;
}

.copy{
    background:#333;
    color:white;
}

.copy:hover{
    background:#444;
}

.qr{
    border-color:#444;
}

}

</style>
</head>
<body>

<div class="card">

    <div class="header">
        <h1>💸 Scan to Pay</h1>
        <p>Secure UPI Payment</p>
    </div>

    <div class="content">

        <img src="qr.png" alt="UPI QR Code" class="qr">

        <div class="name">
            Vikas Sharma
        </div>

        <div class="upi" id="upiid">
            mstrvikasaxis@ybl
        </div>

        <button class="pay" onclick="payNow()">
            💳 Pay Now
        </button>

        <button class="copy" onclick="copyUPI()">
            📋 Copy UPI ID
        </button>

        <div class="apps">
            Works with<br><br>

            🟣 PhonePe &nbsp;&nbsp;
            🔵 Google Pay &nbsp;&nbsp;
            🔷 Paytm &nbsp;&nbsp;
            ⚫ BHIM
        </div>

        <div class="footer">
            ❤️ Thank you for your payment
        </div>

    </div>

</div>

<div id="toast" class="toast">
    ✅ UPI ID Copied
</div>
<script>

const upiID = "mstrvikasaxis@ybl";

const upiLink =
"upi://pay?pa=" + upiID +
"&pn=Vikas%20Sharma&cu=INR";

function payNow() {
    window.location.href = upiLink;

    setTimeout(function () {
        document.querySelector(".footer").innerHTML =
        "If no UPI app opened, please scan the QR code above.<br><br>❤️ Thank you for your payment.";
    }, 1800);
}

function copyUPI() {

    navigator.clipboard.writeText(upiID);

    const toast = document.getElementById("toast");

    toast.classList.add("show");

    setTimeout(function () {
        toast.classList.remove("show");
    }, 2000);

}

// Auto-open UPI on Android only
if (/Android/i.test(navigator.userAgent)) {

    setTimeout(function () {
        window.location.href = upiLink;
    }, 1000);

}

</script>

</body>
</html>
